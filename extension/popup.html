<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Honeypot V3</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🍯</span>
        <div>
          <h1>AI Honeypot <span class="v3-badge">V3</span></h1>
          <p class="subtitle">Maximum Intel Extraction</p>
        </div>
      </div>
      <div class="header-right">
        <span id="totalTime" class="total-time" style="display:none"></span>
        <button id="historyBtn" class="icon-btn" title="Session History">📜</button>
      </div>
    </div>

    <!-- API Key Warning -->
    <div id="apiWarning" class="api-warning" style="display:none">
      ⚠️ No API key. <a href="#" id="openOptions">Configure in Options</a>
    </div>

    <!-- Session History Panel -->
    <div id="historyPanel" class="history-panel" style="display:none"></div>

    <!-- Call Timer Bar -->
    <div id="timerBar" class="timer-bar" style="display:none">
      <div class="timer-left">
        <span class="rec-dot"></span>
        <span id="callTimer" class="timer-text">00:00</span>
      </div>
      <span id="scamBadge" class="scam-badge" style="display:none"></span>
      <span id="escalationBadge" class="escalation-badge"></span>
    </div>

    <!-- Persona Selection -->
    <div id="personaSection" class="persona-section">
      <h2>Select Persona</h2>
      <div id="personaGrid" class="persona-grid"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="startBtn" class="start-btn">🍯 Hand-off Call to AI</button>
      <div id="activeControls" class="active-controls" style="display:none">
        <button id="skipBtn" class="skip-btn">⏭️ Skip</button>
        <button id="endBtn" class="end-btn">📞 End</button>
        <button id="exportBtn" class="export-btn">📋 Export</button>
      </div>
    </div>

    <!-- Voice Status -->
    <div id="voiceStatus" class="voice-status" style="display:none">
      <div id="statusInner" class="status"></div>
    </div>

    <!-- Transcript -->
    <div id="transcriptBox" class="transcript-box" style="display:none"></div>

    <!-- Intelligence Panel -->
    <div id="intelPanel" class="intel-panel" style="display:none">
      <h3>🔍 Extracted Intelligence (<span id="intelCount">0</span>)</h3>
      <div id="intelGrid" class="intel-grid"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
