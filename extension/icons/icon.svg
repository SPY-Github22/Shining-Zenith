<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="honeyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="56" fill="url(#bgGrad)" />
  
  <!-- Pot Body -->
  <g filter="url(#shadow)">
    <path d="M36 50 C36 50 30 100 64 100 C98 100 92 50 92 50" fill="url(#potGrad)" stroke="#b45309" stroke-width="1.5"/>
    <ellipse cx="64" cy="50" rx="28" ry="8" fill="#fcd34d" stroke="#b45309" stroke-width="1.5"/>
  </g>
  
  <!-- Honey Drip (Center) -->
  <path d="M56 56 Q 64 75 72 56" fill="#fbbf24" stroke="#d97706" stroke-width="2" stroke-linecap="round" fill-opacity="0.8"/>
  
  <!-- Honey Dipper -->
  <g transform="rotate(15, 64, 64)">
    <!-- Stick -->
    <rect x="62" y="20" width="4" height="45" rx="2" fill="#78350f"/>
    <!-- Dipper Head -->
    <path d="M56 32 H72 M56 36 H72 M56 40 H72" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
    <rect x="58" y="28" width="12" height="16" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  </g>
  
  <!-- Shine/Highlight -->
  <ellipse cx="80" cy="40" rx="8" ry="4" fill="white" fill-opacity="0.2" transform="rotate(-30, 80, 40)"/>
</svg>
